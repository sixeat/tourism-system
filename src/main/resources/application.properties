# ============================================================
#  应用配置文件（application.properties）
#  文件路径：classpath:application.properties
#  作用：集中存放应用程序运行时的外部化配置参数，
#       Spring 的 PropertyPlaceholderConfigurer 会加载此文件，
#       将属性值注入到 Spring Bean 中，实现配置与代码分离。
# ============================================================

# ------------------------------------------------------------
#  数据库连接配置（JDBC）
# ------------------------------------------------------------
# 数据库驱动类名，使用 MySQL 8.x 的新版驱动（com.mysql.cj.jdbc.Driver），
# 支持 MySQL 8.0 的 caching_sha2_password 认证插件和时区自动检测。
# 旧版驱动 com.mysql.jdbc.Driver 已在 MySQL 8 中废弃。
db.driver=com.mysql.cj.jdbc.Driver

# 数据库 JDBC URL，使用 ${VAR:default} 语法实现环境变量回退：
# - 优先读取操作系统环境变量 DB_URL 的值；
# - 如果环境变量未设置，则使用默认值 jdbc:mysql://localhost:3306/tourism_system...
# URL 参数说明：
#   useUnicode=true           — 启用 Unicode 字符集支持，确保中文正确传输；
#   characterEncoding=UTF-8   — 指定连接层字符编码为 UTF-8；
#   serverTimezone=Asia/Shanghai — 显式设置数据库会话时区为亚洲/上海，
#                                   避免 MySQL 8 时区不一致导致的异常。
db.url=${DB_URL:jdbc:mysql://localhost:3306/tourism_system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}

# 数据库连接用户名，同样支持环境变量回退，默认值为 root。
# 生产环境强烈建议通过环境变量注入，避免将敏感信息硬编码到配置文件中。
db.username=${DB_USERNAME:root}

# 数据库连接密码，默认值为空字符串。
# 出于安全考虑，生产环境中必须通过 DB_PASSWORD 环境变量传入，
# 并将此文件加入 .gitignore 防止提交到版本库。
db.password=${DB_PASSWORD:}

# ------------------------------------------------------------
#  MyBatis 持久层配置
# ------------------------------------------------------------
# mapper-locations：指定 MyBatis Mapper XML 文件的扫描路径，
# classpath*:mapper/*.xml 表示在类路径下的所有 mapper 目录中搜索以 .xml 结尾的文件，
# 这些 XML 文件中定义了 SQL 语句与 Java Mapper 接口方法的映射关系。
mybatis.mapper-locations=classpath*:mapper/*.xml

# type-aliases-package：指定需要自动设置别名的实体类包路径，
# 在此包下的所有类（如 com.tourism.entity.ScenicSpot）在 Mapper XML 中可直接使用短名（如 ScenicSpot），
# 无需书写全限定类名，减少 XML 配置冗余。
mybatis.type-aliases-package=com.tourism.entity

# ------------------------------------------------------------
#  AI 外部模型接口配置（OpenAI 兼容格式）
# ------------------------------------------------------------
# 注意：以下配置默认处于禁用状态，即使不设置 AI_API_KEY，系统内置的本地 RAG 降级逻辑仍可正常工作。
# 该模块主要用于扩展智能问答功能，如景点推荐、行程规划等场景。

# 是否启用 AI 外部接口调用，布尔值，默认 false（禁用）。
# 设为 true 时，系统会尝试调用外部大模型 API 进行智能对话。
ai.api.enabled=${AI_API_ENABLED:false}

# 外部 AI 接口的完整 URL，默认指向 DeepSeek 的 Chat Completions 端点，
# 兼容 OpenAI API 格式（/chat/completions），也可替换为其他兼容服务商（如硅基流动、阿里云等）。
ai.api.url=${AI_API_URL:https://api.deepseek.com/chat/completions}

# 外部 AI 接口的 API 密钥（Access Token），默认值为空。
# 必须妥善保管，切勿泄露；建议通过环境变量 AI_API_KEY 注入，
# 在服务器端配置而不是客户端或代码仓库中。
ai.api.key=${AI_API_KEY:}

# 调用外部 AI 接口时使用的模型名称，默认使用 deepseek-v4-flash（DeepSeek 的快速响应模型），
# 可根据实际服务商支持的模型列表进行调整，如 deepseek-chat、gpt-4o 等。
ai.api.model=${AI_API_MODEL:deepseek-v4-flash}
